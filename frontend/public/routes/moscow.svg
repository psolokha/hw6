<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="200" y1="700" x2="1000" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
  </defs>
  <rect width="1200" height="900" rx="48" fill="url(#bg)"/>

  <!-- Route line -->
  <path d="M210 650 C 360 520, 520 760, 690 600 S 960 540, 1010 410" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-dasharray="1 26"/>
  <path d="M210 650 C 360 520, 520 760, 690 600 S 960 540, 1010 410" stroke="#0F172A" stroke-opacity="0.15" stroke-width="18" stroke-linecap="round"/>

  <!-- Pins -->
  <g fill="#0F172A" fill-opacity="0.65">
    <circle cx="210" cy="650" r="16"/>
    <circle cx="505" cy="705" r="16"/>
    <circle cx="690" cy="600" r="16"/>
    <circle cx="900" cy="560" r="16"/>
    <circle cx="1010" cy="410" r="16"/>
  </g>

  <!-- Kremlin-like silhouette (simple) -->
  <g transform="translate(190,420)">
    <path d="M290 300 V190 H450 V300 H290Z" fill="#1F2937" opacity="0.78"/>
    <path d="M250 300 V220 C250 185 280 160 315 160 H425 C460 160 490 185 490 220 V300 H250Z" fill="#111827" opacity="0.55"/>
    <path d="M260 185 C290 140 340 120 390 120 C440 120 490 140 520 185" fill="none" stroke="#0B1220" stroke-opacity="0.28" stroke-width="16" stroke-linecap="round"/>
    <g fill="#0B1220" opacity="0.42">
      <rect x="270" y="185" width="40" height="58" rx="10"/>
      <rect x="320" y="170" width="40" height="73" rx="10"/>
      <rect x="370" y="160" width="40" height="83" rx="10"/>
      <rect x="420" y="170" width="40" height="73" rx="10"/>
      <rect x="470" y="185" width="40" height="58" rx="10"/>
    </g>
  </g>
</svg>


<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="accent" x1="170" y1="720" x2="1030" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" />
    </filter>
  </defs>

  <rect width="1200" height="900" rx="48" fill="url(#bg)"/>

  <!-- Sky glow -->
  <circle cx="320" cy="220" r="140" fill="#A78BFA" opacity="0.45" filter="url(#soft)"/>
  <circle cx="960" cy="240" r="120" fill="#38BDF8" opacity="0.35" filter="url(#soft)"/>

  <!-- Route line -->
  <path d="M180 620 C 320 520, 430 760, 610 600 S 920 560, 1020 420" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-dasharray="1 26"/>
  <path d="M180 620 C 320 520, 430 760, 610 600 S 920 560, 1020 420" stroke="#0F172A" stroke-opacity="0.14" stroke-width="18" stroke-linecap="round"/>

  <!-- Pins -->
  <g fill="#0F172A" fill-opacity="0.62">
    <circle cx="180" cy="620" r="16"/>
    <circle cx="430" cy="700" r="16"/>
    <circle cx="610" cy="600" r="16"/>
    <circle cx="840" cy="560" r="16"/>
    <circle cx="1020" cy="420" r="16"/>
  </g>

  <!-- Gothic arch silhouette -->
  <g transform="translate(170,410)">
    <path d="M120 420V250C120 150 220 80 330 80C440 80 540 150 540 250V420H120Z" fill="#0F172A" opacity="0.78"/>
    <path d="M210 420V265C210 210 260 160 330 160C400 160 450 210 450 265V420H210Z" fill="#111827" opacity="0.55"/>
    <path d="M330 170C270 210 245 265 245 320C245 370 275 410 330 410C385 410 415 370 415 320C415 265 390 210 330 170Z" fill="#0B1220" opacity="0.35"/>
    <rect x="145" y="260" width="60" height="160" rx="12" fill="#0B1220" opacity="0.32"/>
    <rect x="455" y="260" width="60" height="160" rx="12" fill="#0B1220" opacity="0.32"/>
  </g>
</svg>


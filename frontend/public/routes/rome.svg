<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFEDD5"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="accent" x1="200" y1="700" x2="1000" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FB7185" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
  </defs>

  <rect width="1200" height="900" rx="48" fill="url(#bg)"/>

  <!-- Sun -->
  <circle cx="980" cy="180" r="90" fill="#FDBA74" opacity="0.9" filter="url(#soft)"/>

  <!-- Route line -->
  <path d="M210 640 C 360 520, 520 760, 690 580 S 960 520, 1010 380" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-dasharray="1 26"/>
  <path d="M210 640 C 360 520, 520 760, 690 580 S 960 520, 1010 380" stroke="#0F172A" stroke-opacity="0.15" stroke-width="18" stroke-linecap="round"/>

  <!-- Pins -->
  <g fill="#0F172A" fill-opacity="0.65">
    <circle cx="210" cy="640" r="16"/>
    <circle cx="505" cy="690" r="16"/>
    <circle cx="690" cy="580" r="16"/>
    <circle cx="900" cy="520" r="16"/>
    <circle cx="1010" cy="380" r="16"/>
  </g>

  <!-- Colosseum silhouette -->
  <g transform="translate(120,420)">
    <path d="M210 320 C210 220 360 150 520 150 C680 150 830 220 830 320 V410 H210 V320Z" fill="#1F2937" opacity="0.78"/>
    <path d="M265 325 C265 255 370 205 520 205 C670 205 775 255 775 325 V385 H265 V325Z" fill="#111827" opacity="0.55"/>
    <g fill="#0B1220" opacity="0.42">
      <rect x="285" y="315" width="40" height="58" rx="10"/>
      <rect x="355" y="300" width="40" height="73" rx="10"/>
      <rect x="425" y="290" width="40" height="83" rx="10"/>
      <rect x="495" y="285" width="40" height="88" rx="10"/>
      <rect x="565" y="290" width="40" height="83" rx="10"/>
      <rect x="635" y="300" width="40" height="73" rx="10"/>
      <rect x="705" y="315" width="40" height="58" rx="10"/>
    </g>
  </g>
</svg>


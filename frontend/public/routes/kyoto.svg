<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DCFCE7"/>
      <stop offset="1" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="720" x2="1030" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

  <rect width="1200" height="900" rx="48" fill="url(#bg)"/>

  <!-- Mist -->
  <ellipse cx="600" cy="300" rx="520" ry="160" fill="#FFFFFF" opacity="0.35" filter="url(#soft)"/>

  <!-- Route line -->
  <path d="M210 650 C 360 520, 520 760, 690 600 S 920 560, 1010 420" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-dasharray="1 26"/>
  <path d="M210 650 C 360 520, 520 760, 690 600 S 920 560, 1010 420" stroke="#0F172A" stroke-opacity="0.14" stroke-width="18" stroke-linecap="round"/>

  <!-- Pins -->
  <g fill="#0F172A" fill-opacity="0.62">
    <circle cx="210" cy="650" r="16"/>
    <circle cx="500" cy="705" r="16"/>
    <circle cx="690" cy="600" r="16"/>
    <circle cx="900" cy="560" r="16"/>
    <circle cx="1010" cy="420" r="16"/>
  </g>

  <!-- Torii gate silhouette -->
  <g transform="translate(290,360)">
    <path d="M120 420V140H200V420H120Z" fill="#0F172A" opacity="0.78"/>
    <path d="M520 420V140H600V420H520Z" fill="#0F172A" opacity="0.78"/>
    <path d="M70 170C150 120 270 95 360 95C450 95 570 120 650 170V240C570 190 450 165 360 165C270 165 150 190 70 240V170Z" fill="#111827" opacity="0.7"/>
    <path d="M110 120C205 70 300 50 360 50C420 50 515 70 610 120V150C520 105 430 90 360 90C290 90 200 105 110 150V120Z" fill="#0B1220" opacity="0.42"/>
    <rect x="230" y="220" width="260" height="200" rx="18" fill="#0B1220" opacity="0.26"/>
  </g>
</svg>


<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0E7FF"/>
      <stop offset="1" stop-color="#FCE7F3"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="740" x2="1040" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FB7185" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" />
    </filter>
  </defs>

  <rect width="1200" height="900" rx="48" fill="url(#bg)"/>

  <!-- Glow -->
  <circle cx="900" cy="220" r="140" fill="#FB7185" opacity="0.28" filter="url(#soft)"/>
  <circle cx="320" cy="260" r="160" fill="#6366F1" opacity="0.20" filter="url(#soft)"/>

  <!-- Route line -->
  <path d="M210 650 C 360 520, 520 760, 690 600 S 940 560, 1030 420" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-dasharray="1 26"/>
  <path d="M210 650 C 360 520, 520 760, 690 600 S 940 560, 1030 420" stroke="#0F172A" stroke-opacity="0.14" stroke-width="18" stroke-linecap="round"/>

  <!-- Pins -->
  <g fill="#0F172A" fill-opacity="0.62">
    <circle cx="210" cy="650" r="16"/>
    <circle cx="500" cy="705" r="16"/>
    <circle cx="690" cy="600" r="16"/>
    <circle cx="920" cy="560" r="16"/>
    <circle cx="1030" cy="420" r="16"/>
  </g>

  <!-- Eiffel Tower silhouette -->
  <g transform="translate(380,280)">
    <path d="M220 560H500L465 500H255L220 560Z" fill="#0F172A" opacity="0.78"/>
    <path d="M300 500L360 260L420 500H300Z" fill="#111827" opacity="0.70"/>
    <path d="M330 500L360 330L390 500H330Z" fill="#0B1220" opacity="0.40"/>
    <rect x="345" y="220" width="30" height="80" rx="10" fill="#0F172A" opacity="0.78"/>
    <path d="M265 500C300 465 320 440 360 440C400 440 420 465 455 500H265Z" fill="#0B1220" opacity="0.26"/>
  </g>
</svg>


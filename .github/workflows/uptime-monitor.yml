name: Production uptime monitor

on:
  schedule:
    # Каждые 15 минут; GitHub Actions шлёт email при падении workflow (если включены уведомления).
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: uptime-monitor
  cancel-in-progress: false

jobs:
  health:
    name: Health checks (prod)
    runs-on: ubuntu-latest
    steps:
      - name: Backend health (DB + auth)
        env:
          BACKEND_URL: https://hw6-ac72.vercel.app
        run: |
          set -euo pipefail
          body="$(curl -fsS "$BACKEND_URL/api/health")"
          echo "$body"
          echo "$body" | jq -e '.ok == true'
          echo "$body" | jq -e '.checks.database.status == "ok"'
          echo "$body" | jq -e '.checks.auth.status == "ok"'

      - name: Frontend health (backend reachability)
        env:
          FRONTEND_URL: https://hw6-pi-ruddy.vercel.app
        run: |
          set -euo pipefail
          body="$(curl -fsS "$FRONTEND_URL/api/health")"
          echo "$body"
          echo "$body" | jq -e '.ok == true'
          echo "$body" | jq -e '.checks.backend.status == "ok"'

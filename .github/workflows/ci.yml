name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Отменяем устаревшие запуски при новом пуше в ту же ветку/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Prettier (format check)
        run: npm run format:check

      - name: ESLint (frontend)
        run: npm run lint

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-build

  backend:
    name: Backend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [quality, frontend, backend]
    env:
      # Backend
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_JWKS_URL: ${{ secrets.SUPABASE_JWKS_URL }}
      CORS_ORIGIN: http://127.0.0.1:3000
      OSM_MOCK: "1"
      # Frontend (public)
      NEXT_PUBLIC_BACKEND_URL: http://127.0.0.1:4000
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      # E2E test user
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
    steps:
      - name: Check required secrets
        id: precheck
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${TEST_USER_EMAIL}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::E2E пропущены — не заданы секреты (SUPABASE_URL / TEST_USER_*). Добавьте их в Settings → Secrets and variables → Actions."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.precheck.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.precheck.outputs.ready == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.precheck.outputs.ready == 'true'
        run: |
          npm ci
          npm --prefix frontend ci
          npm --prefix backend ci

      - name: Install Playwright browsers
        if: steps.precheck.outputs.ready == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: steps.precheck.outputs.ready == 'true'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ always() && steps.precheck.outputs.ready == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

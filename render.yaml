# Render Blueprint для backend (Fastify).
# Импортируйте через Render Dashboard → New → Blueprint, указав этот репозиторий.
# Значения с `sync: false` нужно задать вручную в дашборде (секреты).
services:
  - type: web
    name: nearstep-backend
    runtime: node
    plan: free
    rootDir: backend
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Render сам прокидывает PORT — приложение его читает из env.
      - key: HOST
        value: 0.0.0.0
      # Origin фронтенда на Vercel, например https://nearstep.vercel.app
      - key: CORS_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: OSM_USER_AGENT
        value: "nearstep-hw6-backend/0.1 (contact: you@example.com)"
      - key: OSM_NOMINATIM_BASE_URL
        value: https://nominatim.openstreetmap.org
      - key: OSM_OVERPASS_BASE_URL
        value: https://overpass-api.de/api/interpreter
